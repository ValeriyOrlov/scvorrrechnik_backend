version: '3.8'

services:
  auth-server:
    image: valerrriyorlov/auth-server:latest
    ports:
      - "8080:8080"
    environment:
      - ALLOW_ORIGINS=https://scvrrrchnk-msg-client.vercel.app
      - APP_PORT=8080
      - DB_HOST=${AUTH_DB_HOST}
      - DB_PORT=5432
      - DB_USER=${AUTH_DB_USER}
      - DB_PASSWORD=${AUTH_DB_PASSWORD}
      - DB_NAME=${AUTH_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_ACCESS_TTL=15m
      - AUTH_REFRESH_TTL=168h
    restart: unless-stopped

  messenger-server:
    image: valerrriyorlov/messenger-server:latest
    ports:
      - "8081:8081"
    environment:
      - ALLOW_ORIGINS=https://scvrrrchnk-msg-client.vercel.app
      - APP_PORT=8081
      - DB_HOST=${MESSENGER_DB_HOST}
      - DB_PORT=5432
      - DB_USER=${MESSENGER_DB_USER}
      - DB_PASSWORD=${MESSENGER_DB_PASSWORD}
      - DB_NAME=${MESSENGER_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped